name: Update public data

on:
  schedule:
    # 22:00 UTC is 07:00 KST on the following day.
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-public-data
  cancel-in-progress: false

jobs:
  collect-export-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Seoul

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Create collector environment
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          printf '%s\n' \
            "DATA_GO_KR_SERVICE_KEY=${DATA_GO_KR_SERVICE_KEY}" \
            "NAVER_CLIENT_ID=${NAVER_CLIENT_ID}" \
            "NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}" \
            "G2B_MODULAR_LOOKBACK_DAYS=180" \
            "G2B_MODULAR_PAGE_SIZE=100" \
            "G2B_PLAN_LOOKAHEAD_MONTHS=12" \
            "G2B_PLAN_PAGE_SIZE=100" \
            "D2B_LOOKAHEAD_MONTHS=12" \
            "D2B_PAGE_SIZE=50" \
            "D2B_LEGACY_API_ENABLED=false" \
            "NAVER_NEWS_LOOKBACK_DAYS=14" \
            "NAVER_NEWS_DISPLAY=50" > .env

      - name: Back up currently published JSON
        run: |
          mkdir -p "$RUNNER_TEMP/public-data-backup"
          cp frontend/public/data/business.json "$RUNNER_TEMP/public-data-backup/business.json"
          cp frontend/public/data/news.json "$RUNNER_TEMP/public-data-backup/news.json"
          cp frontend/public/data/meta.json "$RUNNER_TEMP/public-data-backup/meta.json"

      - name: Collect bids and news
        run: |
          set +e
          command="python scripts/collect_all.py --skip-procurement-plans --skip-lh --skip-d2b"
          echo "Running: $command"
          $command
          code=$?
          echo "command=$command exit_code=$code"
          if [ "$code" -ne 0 ]; then
            echo "::warning::입찰/뉴스 일부 수집기가 실패했습니다. exit_code=$code"
          fi
          exit 0

      - name: Collect G2B procurement plans
        run: |
          if [ -f scripts/collect_g2b_procurement_plans.py ]; then
            set +e
            command="python scripts/collect_g2b_procurement_plans.py"
            echo "Running: $command"
            python scripts/collect_g2b_procurement_plans.py
            code=$?
            echo "command=$command exit_code=$code"
            if [ "$code" -ne 0 ]; then
              echo "::warning::나라장터 발주계획 수집 실패. exit_code=$code"
            fi
          else
            echo "G2B procurement plan collector is not present; continuing."
          fi
          exit 0

      - name: Record D2B legacy API status
        run: |
          echo "::warning::방위사업청 기존 군수품조달정보 API가 중지 상태입니다. 자동 수집에서 제외하며 추후 GW API 전환이 필요합니다."

      - name: Collect known important G2B bids
        run: |
          set +e
          command="python scripts/collect_known_g2b_bids.py"
          echo "Running: $command"
          $command
          code=$?
          echo "command=$command exit_code=$code"
          if [ "$code" -ne 0 ]; then
            echo "::warning::known important bid 수집 실패. exit_code=$code"
          fi
          exit 0

      - name: Export public JSON
        run: python scripts/export_public_json.py

      - name: Diagnose procurement plan pipeline
        run: |
          if [ -f scripts/diagnose_procurement_plan_gap.py ]; then
            set +e
            command="python scripts/diagnose_procurement_plan_gap.py"
            echo "Running: $command"
            $command
            code=$?
            echo "command=$command exit_code=$code"
            if [ "$code" -ne 0 ]; then
              echo "::warning::발주계획 진단 스크립트 실패. exit_code=$code"
            fi
          else
            echo "::warning::scripts/diagnose_procurement_plan_gap.py가 없어 진단을 건너뜁니다."
          fi
          exit 0

      - name: Check generated dataset and restore on empty output
        id: publish_guard
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          root = Path("frontend/public/data")
          business = json.loads((root / "business.json").read_text(encoding="utf-8"))["items"]
          news = json.loads((root / "news.json").read_text(encoding="utf-8"))["items"]
          ready = bool(business and news)
          if not business or not news:
              backup = Path(os.environ["RUNNER_TEMP"]) / "public-data-backup"
              for name in ("business.json", "news.json", "meta.json"):
                  shutil.copy2(backup / name, root / name)
              print(f"::warning::공개 데이터가 비어 기존 JSON을 복원했습니다: business={len(business)}, news={len(news)}")
          else:
              print(f"Publish guard passed: business={len(business)}, news={len(news)}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"publish_ready={'true' if ready else 'false'}\n")
          PY

      - name: Run public data security and contract tests
        if: steps.publish_guard.outputs.publish_ready == 'true'
        run: |
          set -e
          echo "Running: python scripts/test_public_json_export.py"
          python scripts/test_public_json_export.py
          echo "command=test_public_json_export.py exit_code=0"
          echo "Running: python scripts/test_procurement_plan_pipeline.py"
          python scripts/test_procurement_plan_pipeline.py
          echo "command=test_procurement_plan_pipeline.py exit_code=0"

      - name: Commit updated public JSON
        if: steps.publish_guard.outputs.publish_ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/business.json frontend/public/data/news.json frontend/public/data/meta.json
          if git diff --cached --quiet; then
            echo "No public data changes to commit."
            exit 0
          fi
          git commit -m "chore: update public ModularHub data"
          git push
